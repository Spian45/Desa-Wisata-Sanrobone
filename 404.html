<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#B5482C" />
    <link rel="icon" href="favicon.svg" type="image/svg+xml" />
    <title>Halaman Tidak Ditemukan — Desa Wisata Sanrobone</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 24px;
        color: #fff;
        font-family: "Plus Jakarta Sans", "Segoe UI", Arial, sans-serif;
        background: linear-gradient(135deg, #B5482C 0%, #5A2230 100%);
      }
      .kotak { max-width: 520px; }
      h1 {
        font-family: "DM Serif Display", Arial, sans-serif;
        font-size: clamp(70px, 18vw, 130px);
        line-height: 1;
        letter-spacing: -2px;
      }
      h2 { font-size: clamp(20px, 5vw, 28px); margin: 8px 0 16px; }
      p { opacity: 0.92; line-height: 1.7; margin-bottom: 28px; }
      a.tombol {
        display: inline-block;
        background: #fff;
        color: #a4373a;
        text-decoration: none;
        font-weight: 700;
        letter-spacing: 0.5px;
        padding: 13px 28px;
        border-radius: 30px;
        transition: transform 0.2s ease, box-shadow 0.2s ease;
      }
      a.tombol:hover { transform: translateY(-2px); box-shadow: 0 10px 24px rgba(0, 0, 0, 0.25); }
    </style>
  </head>
  <body>
    <div class="kotak">
      <h1>404</h1>
      <h2>Halaman tidak ditemukan</h2>
      <p>
        Maaf, halaman yang Anda cari tidak tersedia.<br />
        <em>Sorry, the page you are looking for could not be found.</em>
      </p>
      <a class="tombol" href="./">KEMBALI KE BERANDA / BACK TO HOME</a>
    </div>
  </body>
</html>
